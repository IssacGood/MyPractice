<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Speech Practice — Mr. Shen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EE;--surface:#fff;--surface2:#F0EDE6;--border:#DDD9D0;
  --text:#1A1814;--muted:#6B6760;--accent:#2D5F4F;--accent-l:#E8F2EE;
  --red:#C0392B;--red-l:#FDECEA;--green:#1B7A4A;--green-l:#E6F4EC;
  --amber:#B8640A;--amber-l:#FEF3E2;--r:14px;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

.hdr{background:var(--accent);color:#fff;padding:max(18px,env(safe-area-inset-top,18px)) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
.hdr h1{font-family:'DM Serif Display',serif;font-size:clamp(16px,5vw,22px);font-weight:400;line-height:1.2}
.hdr p{font-size:11px;opacity:.7;margin-top:2px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.ring-wrap span{font-size:10px;opacity:.7}
.ring-svg{transform:rotate(-90deg)}

.dots-bar{background:var(--accent);padding:0 16px 12px;display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none}
.dots-bar::-webkit-scrollbar{display:none}
.dot-btn{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;transition:all .2s;padding:0}
.dot-btn.active{background:#fff;transform:scale(1.4)}
.dot-btn.done{background:rgba(255,255,255,.7)}
.dot-lbl{font-size:11px;color:rgba(255,255,255,.85);white-space:nowrap;margin-left:4px}

.wrap{max-width:820px;margin:0 auto;padding:16px 14px calc(90px + env(safe-area-inset-bottom,0px) + 16px);overflow-x:hidden}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center}
.scard .v{font-family:'DM Serif Display',serif;font-size:clamp(18px,6vw,26px);line-height:1}
.scard .l{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
.scard.g .v{color:var(--green)}.scard.b .v{color:#1A6BB5}.scard.a .v{color:var(--amber)}

.pill-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.pill{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;min-height:36px}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.done{border-color:var(--green);color:var(--green);background:var(--green-l)}
.pill.done.active{background:var(--green);color:#fff}

.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 18px rgba(0,0,0,.07);overflow:hidden;margin-bottom:14px;min-width:0}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.seg-tag{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);background:var(--accent-l);padding:3px 10px;border-radius:999px;white-space:nowrap}
.seg-ttl{font-size:13px;color:var(--muted)}
.zh-sentence{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6;width:100%;padding-top:6px;border-top:1px dashed var(--border);overflow-wrap:break-word;word-break:break-word}

.script{padding:16px;font-size:clamp(15px,4.2vw,17px);line-height:2;color:var(--text);overflow-wrap:break-word;word-break:break-word;max-width:100%}
.w{display:inline;cursor:default;padding:1px 0;border-radius:3px;transition:background .1s}
.w.wrong{background:var(--red-l);color:var(--red);border-bottom:2px solid var(--red);cursor:pointer}
.w.wrong:active{background:#f8c5bf}
.w.ok{color:var(--green)}

.live-box{margin:0 16px 14px;background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:14px;line-height:1.7;border:1px solid var(--border);transition:border-color .2s;display:none}
.live-box.visible{display:block}
.live-box.listening{border-color:var(--red)}
.live-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.live-box.listening .live-label{color:var(--red)}
.live-content{color:var(--text);min-height:20px;word-break:break-word;overflow-wrap:break-word}
.interim-text{color:var(--muted);font-style:italic}

.desk-ctrl{display:none;padding:12px 16px;background:var(--surface2);border-top:1px solid var(--border);align-items:center;gap:10px;flex-wrap:wrap}
.btn-rd{display:flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:10px 22px;border-radius:999px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .15s}
.btn-rd:hover{background:#245143}
.btn-rd.rec{background:var(--red);animation:pulse 1.2s infinite}
.btn-rd .dot{width:9px;height:9px;border-radius:50%;background:#fff;flex-shrink:0}
.btn-sm{display:flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm:disabled{opacity:.4;cursor:default}
.t-desk{font-family:'DM Mono',monospace;font-size:14px;color:var(--muted);min-width:44px}
.t-desk.rec{color:var(--red)}

.result{padding:16px;border-top:1px solid var(--border);display:none}
.result.show{display:block}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.score-n{font-size:40px;font-weight:600;font-family:'DM Serif Display',serif;line-height:1}
.score-n.hi{color:var(--green)}.score-n.mid{color:var(--amber)}.score-n.lo{color:var(--red)}
.score-sub{font-size:13px;color:var(--muted);margin-top:2px}
.t-box{background:var(--surface2);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.7;color:var(--muted);margin-bottom:14px;overflow-wrap:break-word;word-break:break-word}
.t-box strong{font-weight:500;color:var(--text);display:block;margin-bottom:4px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.err-list{display:flex;flex-direction:column;gap:8px}
.err-item{background:var(--red-l);border-radius:10px;padding:12px 14px;border-left:3px solid var(--red);overflow-wrap:break-word;word-break:break-word}
.err-item .esaid{font-size:16px;color:var(--red);font-weight:600}
.err-item .eword-zh{font-size:13px;color:var(--accent);font-weight:500;margin-top:1px}
.err-item .eheard{font-size:13px;color:var(--amber);margin-top:2px}
.tts-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;border:1.5px solid var(--accent);background:var(--accent-l);color:var(--accent);cursor:pointer;margin-top:8px;min-height:36px}
.tts-btn:active{background:var(--accent);color:#fff}
.sec-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.err-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:600;margin-left:4px;vertical-align:middle}
.retry-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border-radius:999px;border:1.5px solid var(--accent);background:var(--accent-l);color:var(--accent);cursor:pointer;margin-top:4px}
.retry-btn:active{background:var(--accent);color:#fff}

.sticky{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);padding:10px 12px max(10px,env(safe-area-inset-bottom,10px));box-shadow:0 -4px 20px rgba(0,0,0,.09)}
.bot-row{display:flex;align-items:center;gap:8px;max-width:820px;margin:0 auto}
.btn-rec-big{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;padding:13px 16px;border-radius:999px;border:none;background:var(--accent);color:#fff;cursor:pointer;min-height:52px;-webkit-tap-highlight-color:transparent;transition:all .15s}
.btn-rec-big:active{transform:scale(.97)}
.btn-rec-big.rec{background:var(--red);animation:pulse 1.2s infinite}
.btn-rec-big .dot{width:10px;height:10px;border-radius:50%;background:#fff;flex-shrink:0}
.btn-ico{display:flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:18px;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-ico:active{background:var(--surface2);transform:scale(.94)}
.btn-ico:disabled{opacity:.3;cursor:default}
.t-mob{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:34px;text-align:center}
.t-mob.rec{color:var(--red)}
.btn-nav{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:20px;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-nav:active{background:var(--surface2)}
.btn-nav:disabled{opacity:.3;cursor:default}
.swipe-hint{text-align:center;font-size:11px;color:var(--muted);padding:4px 0 0;opacity:.55}
.no-sup{background:var(--amber-l);border:1px solid var(--amber);color:var(--amber);padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;display:none}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}50%{box-shadow:0 0 0 10px rgba(192,57,43,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rec-dot-anim{animation:blink 1s infinite}

@media(min-width:600px){
  .dots-bar{display:none}
  .sticky{display:none}
  .desk-ctrl{display:flex}
  .wrap{padding:26px 24px 60px}
  .swipe-hint{display:none}
  .hdr{padding:26px 40px 20px}
  .script{font-size:17px;padding:20px 24px}
  .card-hdr{padding:16px 24px 12px}
  .live-box{margin:0 24px 14px}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Speech Practice — Mr. Shen</h1>
    <p>Self-introduction · Sentence by sentence</p>
  </div>
  <div class="ring-wrap">
    <svg class="ring-svg" width="46" height="46" viewBox="0 0 46 46">
      <circle cx="23" cy="23" r="18" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="3.5"/>
      <circle cx="23" cy="23" r="18" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="3.5"
        stroke-dasharray="113.1" stroke-dashoffset="113.1" id="progressCircle" stroke-linecap="round"/>
    </svg>
    <span id="progressText">0 / 0</span>
  </div>
</div>

<div class="dots-bar" id="dotsBar"></div>

<div class="wrap">
  <div class="no-sup" id="noSup">⚠️ 請使用 Chrome 或 Edge 瀏覽器。Safari / Firefox 不支援語音辨識。</div>
  <div class="stats">
    <div class="scard g"><div class="v" id="avgScore">—</div><div class="l">平均<br>正確率</div></div>
    <div class="scard b"><div class="v" id="doneCount">0</div><div class="l">已完成<br>句子</div></div>
    <div class="scard a"><div class="v" id="totalErrors">0</div><div class="l">累計<br>錯誤</div></div>
  </div>
  <div class="pill-nav" id="pillNav" style="display:none"></div>
  <div id="cardArea"></div>
  <p class="swipe-hint">← 左右滑動切換句子 →</p>
</div>

<div class="sticky">
  <div class="bot-row">
    <button class="btn-nav" id="btnPrev" onclick="prevSeg()" disabled>‹</button>
    <button class="btn-ico" id="playBtnMob" onclick="playMyAudio()" disabled title="播放錄音">▶</button>
    <button class="btn-rec-big" id="recBtnMob" onclick="toggleRecord()">
      <span class="dot" id="recDotMob"></span>
      <span id="recLblMob">開始錄音</span>
    </button>
    <span class="t-mob" id="timerMob">0:00</span>
    <button class="btn-ico" onclick="speakFull()" title="聆聽範例">🔊</button>
    <button class="btn-nav" id="btnNext" onclick="nextSeg()">›</button>
  </div>
</div>

<script>
// ── SCRIPT DATA ───────────────────────────────────────────────────────────────
const SEGS = [
  // Opening
  {g:"Opening", t:"Hello everyone, my name is Mr. Shen.", zh:"大家好，我是沈老師。"},
  {g:"Opening", t:"Allow me to begin by introducing myself.", zh:"接著我要開始來介紹我自己。"},

  // Background
  {g:"Background", t:"First of all, I hold a Master's degree in Information Management.", zh:"首先，我是一位資管碩士。"},
  {g:"Background", t:"During my internship, I participated in the Digital Cultivation Project at Fushan Elementary School.", zh:"在實習期間，我參與了福山國小的數位深耕計畫。"},
  {g:"Background", t:"The project used IoT Keebi robots to analyze school lunch photos and output calorie values through image recognition.", zh:"內容是透過 IoT 凱比機器人，輸出影像辨識營養午餐的卡路里數值。"},

  // Maker Experience
  {g:"Maker", t:"During my time in Taipei, I was also deeply involved in various Maker courses.", zh:"在台北的期間，我也熱中參與許多 Maker 自造課程。"},
  {g:"Maker", t:"These included 3D printing, laser cutting, and VR programs.", zh:"像是 3D 列印、雷射切割，以及 VR 課程。"},
  {g:"Maker", t:"I learned a great deal at the Rixing Maker Center, and I have also obtained a certified VR instructor qualification.", zh:"當初在日新自造中心學習的許多，我也獲得了 VR 認證講師的資格。"},
  {g:"Maker", t:"I am very familiar with Maker education and related fabrication technologies.", zh:"對於相關的 Maker 自造非常熟悉。"},

  // Current Role
  {g:"Current Role", t:"I currently serve as the Registration Section Chief at Xinzhuang Elementary School.", zh:"我目前在新莊國小擔任註冊組。"},
  {g:"Current Role", t:"I am responsible for subsidy applications and learning assistance program operations.", zh:"負責補助申請與學習扶助相關業務。"},
  {g:"Current Role", t:"When I was in Taipei, I managed the Information Section, handling IT-related projects and administration.", zh:"以前在台北的時候，負責資訊組的業務，資訊電腦相關的計畫與管理，我都非常熟悉。"},
  {g:"Current Role", t:"I also regularly chat with our school's foreign English teacher, Clint.", zh:"目前也經常與本校外師 Clint 聊天。"},
  {g:"Current Role", t:"I have provided real-time support for activities such as using school equipment and conducting international video exchange sessions.", zh:"像是如何使用學校電腦設備與國際學校交流視訊面談，我都有提供對應的即時協助服務。"},

  // Teacher Tools
  {g:"Teacher Tools", t:"Now let me share my actual achievements.", zh:"而接著來到我目前的實際成果方面。"},
  {g:"Teacher Tools", t:"For homeroom teachers, I designed a seating arrangement and point management system.", zh:"首先，關於導師，我設計了一個座位安排與加減分管理系統。"},
  {g:"Teacher Tools", t:"It allows teachers to quickly add or deduct points by seat, and display missing homework notifications.", zh:"提供教師可以快速透過座位加減分，並且能登記顯示缺交作業訊息。"},
  {g:"Teacher Tools", t:"This helps homeroom teachers run their classes more smoothly.", zh:"讓導師在上課教學上更順利。"},

  // Admin Tools
  {g:"Admin Tools", t:"On the administrative side, I designed several web tools.", zh:"行政部分我則是設計了許多網頁。"},
  {g:"Admin Tools", t:"By uploading an Excel file, I can automatically generate individual application forms.", zh:"我可以上傳 Excel 就可以製作產出個別對應的申請表單。"},
  {g:"Admin Tools", t:"I also automated the complex workflows for learning assistance class grouping and exam notification letters.", zh:"以及學習扶助繁雜的編班與考試通知單等作業流程。"},
  {g:"Admin Tools", t:"These tools are expected to reduce the time I spend on related administrative tasks by 70% next semester.", zh:"預計下學期可以減少我 70% 處理相關業務的時間。"},
  {g:"Admin Tools", t:"Through all of these designs, I hope to give teachers — including myself — more time to optimize and design lesson content.", zh:"透過以上這些設計，希望還給老師，包括我自己，可以去花更多的時間優化或設計課程內容。"},
  {g:"Admin Tools", t:"So that teaching can become richer and more engaging.", zh:"讓教學可以更加豐富有趣。"},

  // Student Tools
  {g:"Student Tools", t:"For students in the English learning assistance class, I designed an English Tower Defense game.", zh:"學生方面，我針對學習扶助英文班的學生，設計了英文塔防遊戲。"},
  {g:"Student Tools", t:"It strengthens students' ability to memorize vocabulary through repetition.", zh:"加強學生重複記憶單字的能力。"},
  {g:"Student Tools", t:"I also created a game called Typing Hero Adventure to train students' English and Chinese typing skills.", zh:"還有打字英雄大冒險，訓練學生英文打字與中文打字的能力。"},
  {g:"Student Tools", t:"Students of different levels can progress at their own pace and feel a sense of achievement.", zh:"不同程度的學生，可以依照自己的學習進度，獲得相對應的成就感。"},
  {g:"Student Tools", t:"Everyone can complete the game — the only difference is the time required to reach the same learning outcome.", zh:"大家都可以通關，只是差別在所需要花費的時間，達到同樣的學習結果。"},
  {g:"Student Tools", t:"Finally, this is a pronunciation practice website I designed for students.", zh:"最後這個是為了學生發音設計的發音練習網。"},
  {g:"Student Tools", t:"Students practice correct sentence pronunciation on an iPad using AI recognition.", zh:"學生透過 iPad 練習正確的句子發音，透過 AI 辨識。"},
  {g:"Student Tools", t:"The goal is to train students to speak English clearly enough for AI to understand.", zh:"讓學生練習可以講出正確的英文讓 AI 可以聽得懂，達到訓練口說的目的。"},

  // Vision
  {g:"Vision", t:"I hope to combine my own systems with AI and STEM curriculum ideas learned in Australia.", zh:"希望透過我自己的系統，以及在澳洲 AI-STEM 課程融入的課程。"},
  {g:"Vision", t:"I plan to bring back the full experience of this study tour to Taiwan.", zh:"讓我可以將整個參訪的內容帶回台灣。"},
  {g:"Vision", t:"Then merge and refine it with my own systems to build a framework that truly fits our curriculum.", zh:"與自己的系統融合修正，打造屬於專屬適合我們課程的架構。"},
  {g:"Vision", t:"So that integrating AI into teaching can be universally promoted.", zh:"讓 AI 融入教學可以通用推廣。"},

  // Promotion Plan
  {g:"Plan", t:"After returning to Taiwan, I plan to promote the results of this study tour in three stages.", zh:"回到台灣後，預計分為三個階段推廣本次的參訪成果。"},
  {g:"Plan", t:"First is Micro: through publishing lesson plans and a Maker Exhibition, students will directly benefit from this visit.", zh:"首先是 Micro，透過發布教案與創客展，讓本次的參訪實際讓學生受益。"},
  {g:"Plan", t:"Second is Meso: by organizing school-based communities and sharing on Facebook and YouTube, more people will learn about our efforts in education.", zh:"第二是 Meso，透過學校辦理相關社群，推廣教室座位系統，以及 Facebook 與 YouTube，讓更多人知道我們正在為教育做的努力。"},
  {g:"Plan", t:"Third is Macro: expanding the school community to a city-level workshop, welcoming more teachers to learn and grow together.", zh:"第三是 Macro，將校內的社群變大，變成市級的研習，歡迎更多老師來學習以及一同進步。"},
  {g:"Plan", t:"I will also produce a video showcasing the highlights of this visit, and continue maintaining my systems so all administrative staff can benefit.", zh:"然後將本次參訪的精華做成影片推廣，並且持續維護我的系統，讓各個行政都可以受益。"},
  {g:"Plan", t:"Afterwards, I will produce an administrative workload reduction analysis report, making this study tour truly worthwhile.", zh:"而在之後就可以做一個行政減量的分析報告，讓本次參訪滿載而歸。"},

  // Closing
  {g:"Closing", t:"Finally, for this study tour, I have also set up a real-time interactive chat platform.", zh:"最後為了本次參訪，我也架設好了本次可以運用的即時互動聊天平台。"},
  {g:"Closing", t:"This allows the visit to receive immediate feedback, rather than only producing an after-the-fact report.", zh:"讓參訪可以是一個及時的回饋，不再是一個事後的成果報告。"},
  {g:"Closing", t:"That concludes my self-introduction. Thank you everyone.", zh:"以上是我的自我介紹，謝謝大家。"},
];

// ── WORD DICTIONARY ───────────────────────────────────────────────────────────

  // Education

  printing:"列印", cutting:"切割",

  registration:"註冊", section:"組", chief:"組長", subsidy:"補助",

  engaging:"有趣",

  vocabulary:"單字", memorize:"記憶", repetition:"重複", typing:"打字",

  pronunciation:"發音", practice:"練習", sentence:"句子",

  combine:"結合", framework:"架構", integrated:"整合",

  iot:"IoT（物聯網）", vr:"VR（虛擬實境）", ai:"AI（人工智慧）",
  stem:"STEM（科學科技工程數學）", excel:"Excel試算表", ipad:"iPad",
  facebook:"Facebook", youtube:"YouTube",
};

const TOTAL = SEGS.length;
let cur=0,isRec=false,timerSec=0,timerInt=null;
let finalTx='',interimTx='';
let recognition=null,shouldKeepRecording=false;
let audioBlob=null,audioUrl=null;
let segResults={};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)document.getElementById('noSup').style.display='block';

const norm=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
const tok=s=>s.split(/\s+/).filter(Boolean);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function compareWords(expected,heard){
  const ew=tok(norm(expected)),hw=tok(norm(heard));
  const res=[];let hi=0;
  for(let ei=0;ei<ew.length;ei++){
    let found=false;
    for(let la=hi;la<Math.min(hi+6,hw.length);la++){
      if(hw[la]===ew[ei]){res.push({word:ew[ei],status:'ok'});hi=la+1;found=true;break;}
    }
    if(!found)res.push({word:ew[ei],status:'wrong',heard:hw[hi]||''});
  }
  return res;
}

function renderScript(seg,comparison){
  const parts=seg.t.split(/(\s+)/);
  let html='',wi=0;
  parts.forEach(part=>{
    if(/^\s+$/.test(part)){html+=part;return;}
    if(!norm(part)){html+=esc(part);return;}
    if(comparison&&wi<comparison.length){
      const r=comparison[wi];
      if(r.status==='wrong')html+=`<span class="w wrong" data-word="${esc(part)}">${esc(part)}</span>`;
      else html+=`<span class="w ok">${esc(part)}</span>`;
      wi++;
    }else html+=`<span class="w">${esc(part)}</span>`;
  });
  return html;
}

function wordZh(w){
  const key=w.toLowerCase().replace(/[^a-z0-9]/g,'');
  return WORD_DICT[key]||null;
}

function isMob(){return window.innerWidth<600;}
function updateNavVis(){
  const nav=document.getElementById('pillNav');
  if(nav)nav.style.display=isMob()?'none':'flex';
}
window.addEventListener('resize',()=>{updateNavVis();buildNav();});
updateNavVis();

function buildNav(){
  const nav=document.getElementById('pillNav');
  nav.innerHTML='';
  const groups=[...new Set(SEGS.map(s=>s.g))];
  groups.forEach(g=>{
    const idxs=SEGS.map((s,i)=>s.g===g?i:-1).filter(i=>i>=0);
    const done=idxs.every(i=>segResults[i]);
    const active=idxs.includes(cur);
    const btn=document.createElement('button');
    btn.className='pill'+(active?' active':'')+(done?' done':'');
    btn.textContent=g;
    btn.onclick=()=>goTo(idxs[0]);
    nav.appendChild(btn);
  });
  const bar=document.getElementById('dotsBar');
  bar.innerHTML='';
  SEGS.forEach((seg,i)=>{
    const d=document.createElement('button');
    d.className='dot-btn'+(i===cur?' active':'')+(segResults[i]?' done':'');
    d.onclick=()=>goTo(i);
    bar.appendChild(d);
  });
  const lbl=document.createElement('span');
  lbl.className='dot-lbl';
  lbl.textContent=`${cur+1}/${TOTAL} · ${SEGS[cur].g}`;
  bar.appendChild(lbl);
  const prev=document.getElementById('btnPrev');
  const next=document.getElementById('btnNext');
  if(prev)prev.disabled=cur===0;
  if(next)next.disabled=cur===TOTAL-1;
}

function goTo(i){
  if(isRec)stopRecord();
  cur=i;audioBlob=null;audioUrl=null;
  const pm=document.getElementById('playBtnMob');if(pm)pm.disabled=true;
  buildNav();render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const seg=SEGS[cur];
  const res=segResults[cur];
  const card=document.getElementById('cardArea');

  let resultHTML='';
  if(res){
    const pct=res.accuracy;
    const cls=pct>=80?'hi':pct>=55?'mid':'lo';
    const errors=res.comparison.filter(c=>c.status==='wrong');
    resultHTML=`
    <div class="result show">
      <div class="score-row">
        <span class="score-n ${cls}">${pct}%</span>
        <div>
          <div style="font-size:15px;font-weight:500;">辨識正確率</div>
          <div class="score-sub">${res.comparison.filter(c=>c.status==='ok').length} / ${res.comparison.length} 個字正確</div>
        </div>
        <button class="retry-btn" onclick="retryThis()">↺ 重新練習這句</button>
      </div>
      <div class="t-box">
        <strong>電腦聽到的內容</strong>
        ${esc(res.transcript||'（未偵測到語音）')}
      </div>
      ${errors.length>0?`
      <div class="sec-title">需要加強的單字 <span class="err-badge">${errors.length}</span></div>
      <div class="err-list">
        ${errors.map(e=>{
          const zh=wordZh(e.word);
          return `<div class="err-item">
            <div class="esaid">${esc(e.word)}</div>
            ${zh?`<div class="eword-zh">${esc(zh)}</div>`:''}
            ${e.heard?`<div class="eheard">電腦聽到：${esc(e.heard)}</div>`:`<div class="eheard">（未偵測到）</div>`}
            <button class="tts-btn" onclick="speakWord('${esc(e.word)}')">▶ 聽正確發音</button>
          </div>`;
        }).join('')}
      </div>`:`<div style="color:var(--green);font-size:15px;font-weight:500;padding:4px 0">✓ 完美！沒有錯誤</div>`}
    </div>`;
  }

  card.innerHTML=`
    <div class="card">
      <div class="card-hdr">
        <span class="seg-tag">${esc(seg.g)} · ${cur+1}/${TOTAL}</span>
        <span class="seg-ttl">句子練習</span>
        <div class="zh-sentence">${esc(seg.zh)}</div>
      </div>
      <div class="script">${renderScript(seg,res?res.comparison:null)}</div>
      <div class="live-box" id="liveBox">
        <div class="live-label" id="liveLabel">即時辨識</div>
        <div class="live-content" id="liveText"></div>
      </div>
      <div style="padding:0 16px 10px;text-align:right">
        <button onclick="toggleDebug()" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline">🔍 除錯面板</button>
      </div>
      <div id="debugPanel" style="display:none;margin:0 16px 14px;background:#111;border-radius:8px;padding:10px 12px">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px;letter-spacing:.5px">DEBUG LOG</div>
        <pre id="debugLog" style="font-family:monospace;font-size:11px;color:#7fff7f;line-height:1.6;white-space:pre-wrap;max-height:160px;overflow-y:auto"></pre>
      </div>
      <div class="desk-ctrl">
        <button class="btn-rd" id="recBtnDesk" onclick="toggleRecord()">
          <span class="dot"></span><span id="recLblDesk">Start Recording</span>
        </button>
        <button class="btn-sm" id="playBtnDesk" onclick="playMyAudio()" ${audioUrl?'':'disabled'}>▶ Play back</button>
        <span class="t-desk" id="timerDesk">0:00</span>
        <div style="flex:1"></div>
        <button class="btn-sm" onclick="speakFull()">🔊 Hear it</button>
        ${cur>0?`<button class="btn-sm" onclick="prevSeg()">← Prev</button>`:''}
        ${cur<TOTAL-1?`<button class="btn-sm" onclick="nextSeg()">Next →</button>`:''}
      </div>
      ${resultHTML}
    </div>`;

  if(isRec)syncRecUI(true);
  document.querySelectorAll('.w.wrong').forEach(el=>{
    el.addEventListener('click',()=>speakWord(el.dataset.word));
  });
}

// ── DEBUG ─────────────────────────────────────────────────────────────────────
let debugLines=[];
function dbg(msg){
  const t=new Date().toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  debugLines.unshift(`[${t}] ${msg}`);
  if(debugLines.length>30)debugLines.pop();
  const el=document.getElementById('debugLog');
  if(el)el.textContent=debugLines.join('\n');
}
function toggleDebug(){
  const p=document.getElementById('debugPanel');
  if(p)p.style.display=p.style.display==='none'?'block':'none';
}

// ── RECORDING ─────────────────────────────────────────────────────────────────
function toggleRecord(){isRec?stopRecord():startRecord();}

function startRecord(){
  if(!SR){alert('瀏覽器不支援語音辨識，請改用 Chrome 或 Edge。');return;}
  finalTx='';interimTx='';
  isRec=true;shouldKeepRecording=true;srRestartCount=0;
  audioBlob=null;audioUrl=null;
  const pm=document.getElementById('playBtnMob');if(pm)pm.disabled=true;
  const pd=document.getElementById('playBtnDesk');if(pd)pd.disabled=true;
  timerSec=0;updateTimer();
  timerInt=setInterval(()=>{timerSec++;updateTimer();},1000);
  syncRecUI(true);
  dbg('▶ startRecord()');
  const isAndroid=/Android/i.test(navigator.userAgent);
  if(isAndroid){
    dbg('Android：直接啟動 SR');
    startSRLoop();
  }else{
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      dbg('✓ 麥克風授權成功');
      startAudioRec(stream);
      setTimeout(()=>startSRLoop(),300);
    }).catch(err=>{
      dbg('✗ 麥克風錯誤: '+err.message);
      isRec=false;shouldKeepRecording=false;
      syncRecUI(false);clearInterval(timerInt);
      alert('無法取得麥克風：'+err.message);
    });
  }
}

let srRestartCount=0;
const SR_MAX_RESTARTS=30;

function startSRLoop(){
  if(!shouldKeepRecording){dbg('— SR loop stopped');return;}
  if(srRestartCount>=SR_MAX_RESTARTS){
    dbg('⚠ SR restart cap reached');
    shouldKeepRecording=false;
    const heard=(finalTx+' '+interimTx).trim();
    if(heard)processResult(heard);
    return;
  }
  srRestartCount++;
  dbg(`SR loop #${srRestartCount}`);
  try{recognition=new SR();}
  catch(e){dbg('✗ new SR(): '+e.message);return;}

  recognition.lang='en-US';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.maxAlternatives=3;

  recognition.onstart=()=>{dbg('SR onstart');updateLiveBox(finalTx,'');};
  recognition.onsoundstart=()=>dbg('SR 偵測到聲音');
  recognition.onspeechstart=()=>dbg('SR 偵測到語音');

  recognition.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        let bestTxt='',bestConf=0;
        for(let a=0;a<e.results[i].length;a++){
          const alt=e.results[i][a];
          if(alt.confidence>bestConf){bestConf=alt.confidence;bestTxt=alt.transcript;}
        }
        if(bestConf>=0.25||bestConf===0){
          finalTx+=bestTxt+' ';
          dbg(`final(conf=${bestConf.toFixed(2)}): "${bestTxt}"`);
        }else{
          dbg(`⚠ skip low-conf(${bestConf.toFixed(2)}): "${bestTxt}"`);
        }
      }else interim+=e.results[i][0].transcript;
    }
    interimTx=interim;
    updateLiveBox(finalTx,interim);
  };

  recognition.onerror=e=>{
    dbg('SR error: '+e.error);
    if(e.error==='not-allowed'){
      alert('麥克風權限被拒絕，請在瀏覽器設定中允許麥克風存取。');
      shouldKeepRecording=false;
    }
  };

  recognition.onend=()=>{
    dbg('SR onend | keep='+shouldKeepRecording+' | "'+finalTx.trim().slice(0,40)+'"');
    if(shouldKeepRecording){
      setTimeout(startSRLoop,150);
    }else{
      const heard=(finalTx+' '+interimTx).trim();
      if(heard)processResult(heard);
      else updateLiveBox('','');
    }
  };

  try{recognition.start();dbg('SR .start()');}
  catch(e){dbg('✗ .start(): '+e.message);setTimeout(startSRLoop,500);}
}

function stopRecord(){
  dbg('■ stopRecord()');
  shouldKeepRecording=false;isRec=false;
  clearInterval(timerInt);syncRecUI(false);
  if(recognition){try{recognition.stop();}catch(e){dbg('stop() err: '+e.message);}}
  else{const heard=(finalTx+' '+interimTx).trim();if(heard)processResult(heard);else updateLiveBox('','');}
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
    if(mediaRecorder._stream)mediaRecorder._stream.getTracks().forEach(t=>t.stop());
  }
}

let mediaRecorder=null;
function startAudioRec(stream){
  try{
    const mr=new MediaRecorder(stream);
    const chunks=[];
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{
      if(!chunks.length){dbg('AudioRec: no chunks');return;}
      audioBlob=new Blob(chunks,{type:'audio/webm'});
      audioUrl=URL.createObjectURL(audioBlob);
      dbg('AudioRec: '+chunks.length+' chunks');
      const pm=document.getElementById('playBtnMob');if(pm)pm.disabled=false;
      const pd=document.getElementById('playBtnDesk');if(pd)pd.disabled=false;
    };
    mr.start(500);mediaRecorder=mr;mediaRecorder._stream=stream;
    dbg('AudioRec started');
  }catch(e){dbg('AudioRec error: '+e.message);}
}

function processResult(heard){
  const seg=SEGS[cur];
  const comparison=compareWords(seg.t,heard);
  const correct=comparison.filter(c=>c.status==='ok').length;
  const accuracy=Math.round((correct/comparison.length)*100);
  segResults[cur]={transcript:heard.trim(),comparison,accuracy};
  buildNav();render();updateStats();
}

function retryThis(){
  delete segResults[cur];audioBlob=null;audioUrl=null;
  const pm=document.getElementById('playBtnMob');if(pm)pm.disabled=true;
  buildNav();render();
}

function updateLiveBox(final_,interim_){
  const box=document.getElementById('liveBox');
  const lbl=document.getElementById('liveLabel');
  const txt=document.getElementById('liveText');
  if(!box)return;
  const hasContent=(final_||'').trim()||(interim_||'').trim();
  if(isRec){
    box.classList.add('visible','listening');
    lbl.innerHTML='<span class="rec-dot-anim">●</span> 錄音中…';
    txt.innerHTML=hasContent
      ?esc(final_||'')+(interim_?`<span class="interim-text"> ${esc(interim_)}</span>`:'')
      :'<span style="opacity:.4;font-style:italic">等待語音…</span>';
  }else{
    box.classList.remove('listening');
    lbl.textContent='電腦聽到的內容';
    if(hasContent){box.classList.add('visible');txt.innerHTML=esc((final_+' '+interim_).trim());}
    else box.classList.remove('visible');
  }
}

function syncRecUI(on){
  ['recBtnMob','recBtnDesk'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.toggle('rec',on);});
  const lm=document.getElementById('recLblMob');const ld=document.getElementById('recLblDesk');
  if(lm)lm.textContent=on?'停止錄音':'開始錄音';
  if(ld)ld.textContent=on?'Stop Recording':'Start Recording';
  const dm=document.getElementById('recDotMob');if(dm)dm.classList.toggle('rec-dot-anim',on);
  if(!on)updateLiveBox(finalTx,'');
}

function updateTimer(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  const txt=`${m}:${s.toString().padStart(2,'0')}`;
  const mob=document.getElementById('timerMob');const desk=document.getElementById('timerDesk');
  if(mob){mob.textContent=txt;mob.classList.toggle('rec',isRec);}
  if(desk){desk.textContent=txt;desk.classList.toggle('rec',isRec);}
}

function updateStats(){
  const done=Object.keys(segResults).length;
  const scores=Object.values(segResults).map(r=>r.accuracy);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
  const errs=Object.values(segResults).reduce((acc,r)=>acc+r.comparison.filter(c=>c.status==='wrong').length,0);
  document.getElementById('doneCount').textContent=done;
  document.getElementById('avgScore').textContent=avg!==null?avg+'%':'—';
  document.getElementById('totalErrors').textContent=errs;
  document.getElementById('progressCircle').style.strokeDashoffset=113.1*(1-done/TOTAL);
  document.getElementById('progressText').textContent=`${done} / ${TOTAL}`;
}

function playMyAudio(){if(audioUrl)new Audio(audioUrl).play();}
function speakWord(w){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.82;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
function speakFull(){const u=new SpeechSynthesisUtterance(SEGS[cur].t);u.lang='en-US';u.rate=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}
function prevSeg(){if(cur>0)goTo(cur-1);}
function nextSeg(){if(cur<TOTAL-1)goTo(cur+1);}

let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>55){if(dx<0)nextSeg();else prevSeg();}
},{passive:true});

buildNav();render();updateStats();
</script>
</body>
