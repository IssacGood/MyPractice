<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speech Practice — AI Classroom Lab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F4EE; --surface: #FFFFFF; --surface2: #F0EDE6; --border: #DDD9D0;
  --text: #1A1814; --muted: #6B6760; --accent: #2D5F4F; --accent-light: #E8F2EE;
  --red: #C0392B; --red-light: #FDECEA; --green: #1B7A4A; --green-light: #E6F4EC;
  --amber: #B8640A; --amber-light: #FEF3E2; --radius: 14px; --shadow: 0 2px 20px rgba(0,0,0,0.08);
}
html, body { height: 100%; overflow-x: hidden; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }

/* HEADER */
.header {
  background: var(--accent); color: #fff;
  padding: max(20px, env(safe-area-inset-top, 20px)) 20px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(17px, 5vw, 24px); font-weight: 400; line-height: 1.2; }
.header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.progress-ring { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.progress-ring span { font-size: 10px; opacity: 0.7; }
.ring-svg { transform: rotate(-90deg); }

/* SEGMENT DOTS — mobile only */
.seg-dots {
  background: var(--accent); padding: 0 16px 14px;
  display: flex; gap: 7px; align-items: center; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.seg-dots::-webkit-scrollbar { display: none; }
.seg-dot {
  flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.3); cursor: pointer;
  transition: all 0.2s; border: none; padding: 0;
}
.seg-dot.active { background: #fff; transform: scale(1.4); }
.seg-dot.done { background: rgba(255,255,255,0.7); }
.seg-dot-label { font-size: 11px; color: rgba(255,255,255,0.85); white-space: nowrap; margin-left: 4px; }

/* CONTAINER */
.container {
  max-width: 820px; margin: 0 auto;
  padding: 18px 14px calc(86px + env(safe-area-inset-bottom, 0px) + 16px);
}

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
.stat-card .val { font-family: 'DM Serif Display', serif; font-size: clamp(20px, 6vw, 28px); font-weight: 400; line-height: 1; }
.stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.stat-card.green .val { color: var(--green); }
.stat-card.amber .val { color: var(--amber); }
.stat-card.blue .val { color: #1A6BB5; }

/* DESKTOP NAV PILLS */
.segment-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.seg-btn {
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 15px; border-radius: 999px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; min-height: 36px;
}
.seg-btn:hover { border-color: var(--accent); color: var(--accent); }
.seg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.seg-btn.done { border-color: var(--green); color: var(--green); background: var(--green-light); }
.seg-btn.done.active { background: var(--green); color: #fff; }

/* CARD */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
.card-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.seg-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); background: var(--accent-light); padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
.seg-title { font-size: 13px; color: var(--muted); }

/* SCRIPT */
.script-area { padding: 16px; font-size: clamp(15px, 4.2vw, 17px); line-height: 1.9; color: var(--text); }
.word { display: inline; cursor: default; padding: 1px 0; border-radius: 3px; transition: background 0.1s; }
.word.wrong { background: var(--red-light); color: var(--red); border-bottom: 2px solid var(--red); cursor: pointer; }
.word.wrong:active { background: #f8c5bf; }
.word.correct { color: var(--green); }

/* DESKTOP CONTROLS (inside card) */
.controls-bar-desktop {
  display: none; padding: 14px 16px; background: var(--surface2);
  border-top: 1px solid var(--border); align-items: center; gap: 10px; flex-wrap: wrap;
}
.btn-record-desk {
  display: flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 500; padding: 10px 22px; border-radius: 999px;
  border: none; background: var(--accent); color: #fff; cursor: pointer; transition: all 0.15s;
}
.btn-record-desk:hover { background: #245143; }
.btn-record-desk.recording { background: var(--red); animation: pulse 1.2s infinite; }
.btn-record-desk .dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; flex-shrink: 0; }
.btn-play-desk {
  display: flex; align-items: center; gap: 6px; font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 999px;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s;
}
.btn-play-desk:hover { border-color: var(--accent); color: var(--accent); }
.btn-play-desk:disabled { opacity: 0.4; cursor: default; }
.timer-desk { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--muted); min-width: 44px; }
.timer-desk.active { color: var(--red); }

/* MOBILE STICKY BOTTOM */
.sticky-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px max(10px, env(safe-area-inset-bottom, 10px));
  box-shadow: 0 -4px 20px rgba(0,0,0,0.09);
}
.bottom-row { display: flex; align-items: center; gap: 8px; max-width: 820px; margin: 0 auto; }
.btn-record-big {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
  padding: 13px 16px; border-radius: 999px; border: none;
  background: var(--accent); color: #fff; cursor: pointer; transition: all 0.15s;
  min-height: 50px; -webkit-tap-highlight-color: transparent;
}
.btn-record-big:active { transform: scale(0.97); }
.btn-record-big.recording { background: var(--red); animation: pulse 1.2s infinite; }
.btn-record-big .dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; flex-shrink: 0; }
.btn-icon {
  display: flex; align-items: center; justify-content: center;
  width: 50px; height: 50px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 17px; cursor: pointer; transition: all 0.15s;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.btn-icon:active { background: var(--surface2); transform: scale(0.94); }
.btn-icon:disabled { opacity: 0.32; cursor: default; }
.timer-mob { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); min-width: 34px; text-align: center; }
.timer-mob.active { color: var(--red); }
.btn-nav {
  display: flex; align-items: center; justify-content: center;
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 18px; cursor: pointer; transition: all 0.15s;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.btn-nav:active { background: var(--surface2); }
.btn-nav:disabled { opacity: 0.3; cursor: default; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(192,57,43,0); }
}

/* RESULTS */
.result-panel { padding: 16px; border-top: 1px solid var(--border); display: none; }
.result-panel.show { display: block; }
.score-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.score-badge { font-size: 38px; font-weight: 600; font-family: 'DM Serif Display', serif; line-height: 1; }
.score-badge.high { color: var(--green); }
.score-badge.mid { color: var(--amber); }
.score-badge.low { color: var(--red); }
.score-label { font-size: 13px; color: var(--muted); }
.transcript-box {
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
  font-size: 14px; line-height: 1.7; color: var(--muted); margin-bottom: 14px;
}
.transcript-box strong { font-weight: 500; color: var(--text); display: block; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; }
.errors-list { display: flex; flex-direction: column; gap: 8px; }
.error-item { background: var(--red-light); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--red); }
.error-item .said { font-size: 16px; color: var(--red); font-weight: 600; }
.error-item .heard-text { font-size: 13px; color: var(--amber); margin-top: 2px; }
.tts-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  padding: 8px 14px; border-radius: 999px; border: 1.5px solid var(--accent);
  background: var(--accent-light); color: var(--accent); cursor: pointer; margin-top: 8px;
  min-height: 36px; -webkit-tap-highlight-color: transparent;
}
.tts-btn:active { background: var(--accent); color: #fff; }
.section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.error-count-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--red); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
.no-support { background: var(--amber-light); border: 1px solid var(--amber); color: var(--amber); padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
.swipe-hint { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0 0; opacity: 0.55; }

/* DESKTOP BREAKPOINT */
@media (min-width: 600px) {
  .seg-dots { display: none; }
  .sticky-bottom { display: none; }
  .controls-bar-desktop { display: flex; }
  .container { padding: 28px 24px 60px; }
  .swipe-hint { display: none; }
  .header { padding: 26px 40px 22px; }
  .stats-row { gap: 12px; }
  .stat-card .val { font-size: 28px; }
  .stat-card .lbl { font-size: 12px; }
  .script-area { font-size: 17px; padding: 22px 24px; }
  .card-header { padding: 18px 24px 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Speech Practice Studio</h1>
    <p>AI Classroom Lab — Self-introduction rehearsal</p>
  </div>
  <div class="progress-ring">
    <svg class="ring-svg" width="48" height="48" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="19" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3.5"/>
      <circle cx="24" cy="24" r="19" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3.5"
        stroke-dasharray="119.4" stroke-dashoffset="119.4" id="progressCircle" stroke-linecap="round"/>
    </svg>
    <span id="progressText">0 / 7</span>
  </div>
</div>

<div class="seg-dots" id="segDots"></div>

<div class="container">
  <div class="no-support" id="noSupport">⚠️ 請使用 Chrome 或 Edge 瀏覽器以支援語音辨識功能。</div>

  <div class="stats-row">
    <div class="stat-card green"><div class="val" id="avgScore">—</div><div class="lbl">平均<br>正確率</div></div>
    <div class="stat-card blue"><div class="val" id="doneCount">0</div><div class="lbl">已完成<br>段落</div></div>
    <div class="stat-card amber"><div class="val" id="totalErrors">0</div><div class="lbl">累計<br>錯誤</div></div>
  </div>

  <div class="segment-nav" id="segmentNav" style="display:none"></div>
  <div id="segmentCard"></div>
  <p class="swipe-hint">← 左右滑動切換段落 →</p>
</div>

<!-- Mobile sticky bottom bar -->
<div class="sticky-bottom">
  <div class="bottom-row">
    <button class="btn-nav" id="btnPrev" onclick="prevSeg()" disabled>‹</button>
    <button class="btn-icon" id="playBtnMob" onclick="playMyAudio()" disabled title="播放錄音">▶</button>
    <button class="btn-record-big" id="recordBtnMob" onclick="toggleRecord()">
      <span class="dot"></span>
      <span id="recordLabelMob">開始錄音</span>
    </button>
    <span class="timer-mob" id="timerElMob">0:00</span>
    <button class="btn-icon" onclick="speakFullSegment()" title="聆聽範例">🔊</button>
    <button class="btn-nav" id="btnNext" onclick="nextSeg()">›</button>
  </div>
</div>

<script>
const SEGMENTS = [
  { id:0, label:"Opening", title:"Introduction & Background",
    text:"Hello everyone, I am a 29-year-old educator standing at a critical milestone in my career. I hold a Master's degree in Information Management from National Chiayi University, which has equipped me with strong logical analysis and programming skills." },
  { id:1, label:"Experience", title:"Teaching Positions",
    text:"Currently, I serve as the Registration Section Chief and a computer teacher at Xinzhuang Elementary School in Kaohsiung. Before this, I worked as the Information Section Chief at Zhongxiao Elementary School in Taipei, where I immersed myself in Maker education, including 3D printing, laser cutting, and VR." },
  { id:2, label:"Problem", title:"Administrative Friction",
    text:"In my current role on the frontlines of school administration, I have identified a significant problem in our education system: administrative friction. To solve this, I have dedicated myself to creating administrative automation tools. For instance, I developed a Classroom Seat Chart System and an automated web tool for learning assistance programs, which are expected to reduce repetitive administrative work by 70%. My philosophy is simple: by using technology to improve efficiency, we can give professional time back to teachers so they can focus on education." },
  { id:3, label:"UDL", title:"Universal Design for Learning",
    text:"In the classroom, I am deeply passionate about Universal Design for Learning. I have developed gamified educational tools, such as the English Tower Defense game and Typing Hero, ensuring that students of varying abilities can all experience success. I also integrated Google AI to create a pronunciation practice website to provide instant feedback for students. My practical AI experience even traces back to a nutrition management project using image recognition and IoT robots." },
  { id:4, label:"Motivation", title:"Australia Adventure Project",
    text:"This brings me to my strong motivation for the 1-8-29 Australia Adventure: AI Classroom Lab project. I aim to learn from the New South Wales Department of Education, a recognized global leader in AI and STEM. I am particularly inspired by their School Administration Reduction Program and want to study how they successfully simplified administrative workflows." },
  { id:5, label:"Learning", title:"University Programs",
    text:"Furthermore, through programs at the University of Sydney and UNSW, I want to learn how to standardize my UDL tools and teach Computational Thinking to elementary students more effectively." },
  { id:6, label:"Goals", title:"Return Plan & Vision",
    text:"Upon returning to Taiwan, my goal is not just to share experiences but to drive systemic change. I plan to release an AI Empowerment Toolbox for registration chiefs across Kaohsiung. I will also transform a vacant classroom into an inclusive AI plus STEM Maker Center. Ultimately, I aspire to become an AI-leading Principal who utilizes technology to bridge resource gaps and redefine campus digital transformation. Thank you for your time." }
];

let currentSeg = 0, mediaRecorder = null, recognition = null;
let isRecording = false, timerInterval = null, timerSeconds = 0;
let segResults = {}, audioBlob = null, audioUrl = null, transcriptResult = '';
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) document.getElementById('noSupport').style.display = 'block';

const isMobile = () => window.innerWidth < 600;
function updateNavVisibility() {
  const nav = document.getElementById('segmentNav');
  if (nav) nav.style.display = isMobile() ? 'none' : 'flex';
}
window.addEventListener('resize', () => { updateNavVisibility(); buildNav(); });
updateNavVisibility();

function buildNav() {
  const nav = document.getElementById('segmentNav');
  nav.innerHTML = '';
  SEGMENTS.forEach((seg, i) => {
    const btn = document.createElement('button');
    btn.className = 'seg-btn' + (i===currentSeg?' active':'') + (segResults[i]?' done':'');
    btn.textContent = `${i+1}. ${seg.label}`;
    btn.onclick = () => goToSeg(i);
    nav.appendChild(btn);
  });
  const dots = document.getElementById('segDots');
  dots.innerHTML = '';
  SEGMENTS.forEach((seg, i) => {
    const d = document.createElement('button');
    d.className = 'seg-dot' + (i===currentSeg?' active':'') + (segResults[i]?' done':'');
    d.onclick = () => goToSeg(i);
    dots.appendChild(d);
  });
  const lbl = document.createElement('span');
  lbl.className = 'seg-dot-label';
  lbl.textContent = `${currentSeg+1}/${SEGMENTS.length} · ${SEGMENTS[currentSeg].label}`;
  dots.appendChild(lbl);
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  if (prev) prev.disabled = currentSeg === 0;
  if (next) next.disabled = currentSeg === SEGMENTS.length - 1;
}

function goToSeg(i) {
  currentSeg = i; audioBlob = null; audioUrl = null;
  buildNav(); renderSegment();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const norm = t => t.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
const tok = t => t.split(/\s+/).filter(Boolean);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function compareWords(expected, heard) {
  const ew = tok(norm(expected)), hw = tok(norm(heard));
  const res = []; let hi = 0;
  for (let ei = 0; ei < ew.length; ei++) {
    let found = false;
    for (let la = hi; la < Math.min(hi+5, hw.length); la++) {
      if (hw[la] === ew[ei]) { res.push({word:ew[ei],status:'correct'}); hi=la+1; found=true; break; }
    }
    if (!found) res.push({word:ew[ei],status:'wrong',heard:hw[hi]||''});
  }
  return res;
}

function renderScript(seg, comparison) {
  const parts = seg.text.split(/(\s+)/);
  let html = '', wi = 0;
  parts.forEach(part => {
    if (/^\s+$/.test(part)) { html += part; return; }
    if (!norm(part)) { html += part; return; }
    if (comparison && wi < comparison.length) {
      const r = comparison[wi];
      if (r.status === 'wrong') html += `<span class="word wrong" data-word="${esc(part)}">${esc(part)}</span>`;
      else html += `<span class="word correct">${esc(part)}</span>`;
      wi++;
    } else html += `<span class="word">${esc(part)}</span>`;
  });
  return html;
}

function renderSegment() {
  const seg = SEGMENTS[currentSeg];
  const res = segResults[currentSeg];
  const card = document.getElementById('segmentCard');
  const pm = document.getElementById('playBtnMob');
  if (pm) pm.disabled = !audioUrl;

  let resultHTML = '';
  if (res) {
    const pct = res.accuracy;
    const cls = pct >= 80 ? 'high' : pct >= 55 ? 'mid' : 'low';
    const errors = res.comparison.filter(c => c.status === 'wrong');
    resultHTML = `
    <div class="result-panel show">
      <div class="score-row">
        <span class="score-badge ${cls}">${pct}%</span>
        <div>
          <div style="font-size:15px;font-weight:500;">辨識正確率</div>
          <div class="score-label">${res.comparison.filter(c=>c.status==='correct').length} / ${res.comparison.length} 個字正確</div>
        </div>
      </div>
      <div class="transcript-box">
        <strong>電腦聽到的內容</strong>
        ${esc(res.transcript || '（未偵測到語音）')}
      </div>
      ${errors.length > 0 ? `
      <div class="section-title">錯誤 / 漏唸的單字 <span class="error-count-badge">${errors.length}</span></div>
      <div class="errors-list">
        ${errors.map(e => `
          <div class="error-item">
            <div class="said">${esc(e.word)}</div>
            ${e.heard ? `<div class="heard-text">電腦聽到：${esc(e.heard)}</div>` : `<div class="heard-text">（未偵測）</div>`}
            <button class="tts-btn" onclick="speakWord('${esc(e.word)}')">▶ 聽正確發音</button>
          </div>`).join('')}
      </div>
      ` : `<div style="color:var(--green);font-size:15px;font-weight:500;padding:4px 0;">✓ 沒有錯誤，太棒了！</div>`}
    </div>`;
  }

  card.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="seg-label">段落 ${currentSeg+1} / ${SEGMENTS.length}</span>
        <span class="seg-title">${esc(seg.title)}</span>
      </div>
      <div class="script-area">${renderScript(seg, res ? res.comparison : null)}</div>
      <div class="controls-bar-desktop">
        <button class="btn-record-desk" id="recordBtnDesk" onclick="toggleRecord()">
          <span class="dot"></span><span id="recordLabelDesk">Start Recording</span>
        </button>
        <button class="btn-play-desk" id="playBtnDesk" onclick="playMyAudio()" ${audioUrl?'':'disabled'}>▶ Play back</button>
        <span class="timer-desk" id="timerElDesk">0:00</span>
        <div style="flex:1"></div>
        <button class="btn-play-desk" onclick="speakFullSegment()">🔊 Hear full</button>
        ${currentSeg > 0 ? `<button class="btn-play-desk" onclick="prevSeg()">← Prev</button>` : ''}
        ${currentSeg < SEGMENTS.length-1 ? `<button class="btn-play-desk" onclick="nextSeg()">Next →</button>` : ''}
      </div>
      ${resultHTML}
    </div>`;

  if (isRecording) {
    const db = document.getElementById('recordBtnDesk');
    const dl = document.getElementById('recordLabelDesk');
    if (db) db.classList.add('recording');
    if (dl) dl.textContent = 'Stop Recording';
  }
  document.querySelectorAll('.word.wrong').forEach(el => {
    el.addEventListener('click', () => speakWord(el.dataset.word));
  });
}

function toggleRecord() { isRecording ? stopRecord() : startRecord(); }

function startRecord() {
  if (!SR) { alert('請使用 Chrome 或 Edge 瀏覽器。'); return; }
  audioBlob = null; audioUrl = null; transcriptResult = '';
  isRecording = true;
  ['recordBtnMob','recordBtnDesk'].forEach(id => { const b = document.getElementById(id); if (b) b.classList.add('recording'); });
  document.getElementById('recordLabelMob').textContent = '停止錄音';
  const dl = document.getElementById('recordLabelDesk'); if (dl) dl.textContent = 'Stop Recording';
  const pm = document.getElementById('playBtnMob'); if (pm) pm.disabled = true;
  const pd = document.getElementById('playBtnDesk'); if (pd) pd.disabled = true;
  timerSeconds = 0; updateTimer();
  timerInterval = setInterval(() => { timerSeconds++; updateTimer(); }, 1000);
  recognition = new SR();
  recognition.lang = 'en-US'; recognition.continuous = true; recognition.interimResults = true;
  let ft = '';
  recognition.onresult = e => { for (let i=e.resultIndex;i<e.results.length;i++) if (e.results[i].isFinal) ft += e.results[i][0].transcript + ' '; };
  recognition.onerror = e => console.warn('err', e);
  recognition.onend = () => { transcriptResult = ft.trim(); processResult(); };
  recognition.start();
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const mr = new MediaRecorder(stream);
    const chunks = [];
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = () => {
      audioBlob = new Blob(chunks, { type: 'audio/webm' });
      audioUrl = URL.createObjectURL(audioBlob);
      const pm2 = document.getElementById('playBtnMob'); if (pm2) pm2.disabled = false;
      const pd2 = document.getElementById('playBtnDesk'); if (pd2) pd2.disabled = false;
    };
    mr.start(); mediaRecorder = mr; mediaRecorder._stream = stream;
  }).catch(() => {});
}

function stopRecord() {
  isRecording = false; clearInterval(timerInterval);
  ['recordBtnMob','recordBtnDesk'].forEach(id => { const b = document.getElementById(id); if (b) b.classList.remove('recording'); });
  document.getElementById('recordLabelMob').textContent = '開始錄音';
  const dl = document.getElementById('recordLabelDesk'); if (dl) dl.textContent = 'Start Recording';
  if (recognition) recognition.stop();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); mediaRecorder._stream.getTracks().forEach(t => t.stop()); }
}

function processResult() {
  const seg = SEGMENTS[currentSeg];
  const comparison = compareWords(seg.text, transcriptResult);
  const correct = comparison.filter(c => c.status === 'correct').length;
  const accuracy = Math.round((correct / comparison.length) * 100);
  segResults[currentSeg] = { transcript: transcriptResult, comparison, accuracy };
  buildNav(); renderSegment(); updateOverallStats();
}

function updateTimer() {
  const m = Math.floor(timerSeconds/60), s = timerSeconds%60;
  const txt = `${m}:${s.toString().padStart(2,'0')}`;
  const mob = document.getElementById('timerElMob');
  const desk = document.getElementById('timerElDesk');
  if (mob) { mob.textContent = txt; mob.classList.toggle('active', isRecording); }
  if (desk) { desk.textContent = txt; desk.classList.toggle('active', isRecording); }
}

function playMyAudio() { if (audioUrl) new Audio(audioUrl).play(); }
function speakWord(w) { const u = new SpeechSynthesisUtterance(w); u.lang='en-US'; u.rate=0.82; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }
function speakFullSegment() { const u = new SpeechSynthesisUtterance(SEGMENTS[currentSeg].text); u.lang='en-US'; u.rate=0.9; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }
function prevSeg() { if (currentSeg > 0) goToSeg(currentSeg - 1); }
function nextSeg() { if (currentSeg < SEGMENTS.length - 1) goToSeg(currentSeg + 1); }

function updateOverallStats() {
  const done = Object.keys(segResults).length;
  const scores = Object.values(segResults).map(r => r.accuracy);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  const errors = Object.values(segResults).reduce((acc,r) => acc + r.comparison.filter(c=>c.status==='wrong').length, 0);
  document.getElementById('doneCount').textContent = done;
  document.getElementById('avgScore').textContent = avg !== null ? avg + '%' : '—';
  document.getElementById('totalErrors').textContent = errors;
  document.getElementById('progressCircle').style.strokeDashoffset = 119.4 * (1 - done/SEGMENTS.length);
  document.getElementById('progressText').textContent = `${done} / ${SEGMENTS.length}`;
}

// Swipe to change segment
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 55) { if (dx < 0) nextSeg(); else prevSeg(); }
}, { passive: true });

buildNav();
renderSegment();
</script>
</body>
